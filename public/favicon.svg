<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#00060f"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="28" stroke="#00f5ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="20" stroke="#0066ff" stroke-width="1" opacity="0.5"/>
  <!-- Cross lines -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="#00f5ff" stroke-width="0.8" opacity="0.3"/>
  <line x1="4" y1="32" x2="60" y2="32" stroke="#00f5ff" stroke-width="0.8" opacity="0.3"/>
  <!-- Diagonal lines -->
  <line x1="12" y1="12" x2="52" y2="52" stroke="#0066ff" stroke-width="0.6" opacity="0.2"/>
  <line x1="52" y1="12" x2="12" y2="52" stroke="#0066ff" stroke-width="0.6" opacity="0.2"/>
  <!-- Inner circle (core) -->
  <circle cx="32" cy="32" r="9" stroke="#00f5ff" stroke-width="1.5" opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="4" fill="#00f5ff"/>
  <!-- 4 corner accent dots -->
  <circle cx="32" cy="6"  r="2" fill="#00f5ff" opacity="0.8"/>
  <circle cx="32" cy="58" r="2" fill="#00f5ff" opacity="0.8"/>
  <circle cx="6"  cy="32" r="2" fill="#00f5ff" opacity="0.8"/>
  <circle cx="58" cy="32" r="2" fill="#00f5ff" opacity="0.8"/>
  <!-- Glow effect (simulated with opacity circle) -->
  <circle cx="32" cy="32" r="12" fill="#00f5ff" opacity="0.07"/>
</svg>
